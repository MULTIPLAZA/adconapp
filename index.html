<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ADCONAPP" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>ADCONAPP</title>
  <link rel="stylesheet" href="css/Estilo.css" />
</head>
<body>

  <!-- Login -->
  <div class="LoginFondo" id="LoginFondo">
    <div class="LoginTarjeta">
      <div class="LoginLogo">ADCONAPP</div>
      <p class="LoginSubtitulo">Tablero de ventas</p>
      <div id="LoginAlerta" class="Alerta AlertaError" style="display:none"></div>
      <div class="Grupo">
        <label for="LoginUsuario">Usuario</label>
        <input type="email" id="LoginUsuario" placeholder="usuario@empresa.com" autocomplete="username" />
      </div>
      <div class="Grupo">
        <label for="LoginContrasena">Contrasena</label>
        <input type="password" id="LoginContrasena" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="Boton BotonPrimario BotonCompleto" id="BotonLogin">Ingresar</button>
    </div>
  </div>

  <!-- App (oculta hasta autenticar) -->
  <div id="AppContenido" style="display:none">

  <!-- Cabecera -->
  <header class="Cabecera">
    <span class="LogoCabecera">ADCONAPP</span>
    <div class="AccionCabecera">
      <span class="FechaCabecera" id="FechaCabecera"></span>
      <button class="BotonRefrescar" id="BotonRefrescar" title="Actualizar datos">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </button>
      <button class="BotonRefrescar" id="BotonInstalar" title="Instalar app" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
      </button>
      <button class="BotonRefrescar" id="BotonSalir" title="Cerrar sesion">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="Principal">

    <!-- Vista: Dashboard -->
    <section class="Vista Activo" id="VistaDashboard">
      <div class="Cargando" id="CargandoDashboard">
        <div class="Spinner"></div>
        <span>Cargando...</span>
      </div>
      <div id="ContenidoDashboard"></div>
    </section>

    <!-- Vista: Comparativo -->
    <section class="Vista" id="VistaComparativo">
      <div class="Cargando" id="CargandoComparativo">
        <div class="Spinner"></div>
        <span>Cargando...</span>
      </div>
      <div id="ContenidoComparativo"></div>
    </section>

    <!-- Vista: Objetivo Sucursal -->
    <section class="Vista" id="VistaObjetivoSucursal">
      <div class="Cargando" id="CargandoObjetivoSucursal">
        <div class="Spinner"></div>
        <span>Cargando...</span>
      </div>
      <div id="ContenidoObjetivoSucursal"></div>
    </section>

    <!-- Vista: Objetivo Vendedor -->
    <section class="Vista" id="VistaObjetivoVendedor">
      <div class="Cargando" id="CargandoObjetivoVendedor">
        <div class="Spinner"></div>
        <span>Cargando...</span>
      </div>
      <div id="ContenidoObjetivoVendedor"></div>
    </section>

    <!-- Vista: Parametros -->
    <section class="Vista" id="VistaParametro">
      <div class="Cargando" id="CargandoParametro">
        <div class="Spinner"></div>
        <span>Cargando...</span>
      </div>
      <div id="ContenidoParametro"></div>
    </section>

  </main>

  <!-- Navegacion inferior -->
  <nav class="NavInferior">
    <button class="NavBoton Activo" data-vista="Dashboard" onclick="Navegar('Dashboard', this)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
      </svg>
      <span>Dashboard</span>
    </button>
    <button class="NavBoton" data-vista="Comparativo" onclick="Navegar('Comparativo', this)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
      </svg>
      <span>Comparativo</span>
    </button>
    <button class="NavBoton" data-vista="ObjetivoSucursal" onclick="Navegar('ObjetivoSucursal', this)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <span>Sucursal</span>
    </button>
    <button class="NavBoton" data-vista="ObjetivoVendedor" onclick="Navegar('ObjetivoVendedor', this)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      <span>Vendedor</span>
    </button>
    <button class="NavBoton" data-vista="Parametro" onclick="Navegar('Parametro', this)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
      <span>Parametros</span>
    </button>
  </nav>

  <!-- Banner instalacion iOS (visible solo en Safari/iOS no instalado) -->
  <div id="BannerIOS" style="display:none;position:fixed;bottom:calc(var(--nav-alto) + 10px);left:12px;right:12px;
    background:#1a1d27;border:1px solid #2e3247;border-radius:10px;padding:14px 16px;
    z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <svg viewBox="0 0 24 24" fill="#4f8ef7" style="width:22px;min-width:22px;margin-top:2px">
        <path d="M16 5l-1.42 1.42-1.59-1.59V16h-1.98V4.83L9.42 6.42 8 5l4-4 4 4zm4 5v11c0 1.1-.9 2-2 2H6c-1.11 0-2-.9-2-2V10c0-1.11.89-2 2-2h3v2H6v11h12V10h-3V8h3c1.1 0 2 .89 2 2z"/>
      </svg>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#e2e4ef;margin-bottom:4px">Instalar ADCONAPP</div>
        <div style="font-size:12px;color:#8b90a7;line-height:1.5">
          Toca <strong style="color:#e2e4ef">Compartir</strong>
          <svg viewBox="0 0 24 24" fill="#e2e4ef" style="width:13px;vertical-align:middle;margin:0 2px">
            <path d="M16 5l-1.42 1.42-1.59-1.59V16h-1.98V4.83L9.42 6.42 8 5l4-4 4 4zm4 5v11c0 1.1-.9 2-2 2H6c-1.11 0-2-.9-2-2V10c0-1.11.89-2 2-2h3v2H6v11h12V10h-3V8h3c1.1 0 2 .89 2 2z"/>
          </svg>
          y luego <strong style="color:#e2e4ef">Agregar a pantalla de inicio</strong>
        </div>
      </div>
      <button onclick="document.getElementById('BannerIOS').style.display='none'"
        style="background:none;border:none;color:#8b90a7;font-size:20px;cursor:pointer;padding:0;line-height:1">✕</button>
    </div>
  </div>

  </div><!-- fin AppContenido -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module" src="js/App.js"></script>
</body>
</html>
